services:
  - type: web
    name: engageswap-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: API_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_USERNAME
        value: EngageSwapXBot
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  - type: web
    name: engageswap-web
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_BOT_USERNAME
        value: EngageSwapXBot
      - key: API_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NODE_ENV
        value: production
