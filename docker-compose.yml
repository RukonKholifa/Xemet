version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reply_society_bot
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/reply_society_bot
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      API_SECRET: ${API_SECRET:-changeme}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-EngageSwapXBot}
    ports:
      - '3001:3001'

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_BOT_USERNAME: ${NEXT_PUBLIC_BOT_USERNAME:-EngageSwapXBot}
        NEXT_PUBLIC_API_URL: http://bot:3001
    depends_on:
      - bot
    environment:
      NEXT_PUBLIC_API_URL: http://bot:3001
      NEXT_PUBLIC_BOT_USERNAME: ${NEXT_PUBLIC_BOT_USERNAME:-EngageSwapXBot}
      API_SECRET: ${API_SECRET:-changeme}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/reply_society_bot
    ports:
      - '3000:3000'

volumes:
  pgdata:
